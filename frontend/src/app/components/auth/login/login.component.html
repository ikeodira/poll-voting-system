<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div class="card" style="width:100%;max-width:400px;">
    <h2 style="margin-bottom:0.25rem;">Welcome back</h2>
    <p class="text-muted mb-2">Sign in to your account</p>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input formControlName="email" type="email" placeholder="you@example.com">
        <div class="form-error" *ngIf="f['email'].touched && f['email'].invalid">
          Valid email required
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••">
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword" id="login-password-toggle" aria-label="Toggle password visibility">
            <!-- Eye icon (shown when password is hidden) -->
            <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (shown when password is visible) -->
            <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="form-error" *ngIf="f['password'].touched && f['password'].invalid">
          Password required
        </div>
      </div>
      <button class="btn btn-primary btn-full mt-2" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center mt-2" style="font-size:14px;">
      No account? <a routerLink="/signup">Create one</a>
    </p>
  </div>
</div>
