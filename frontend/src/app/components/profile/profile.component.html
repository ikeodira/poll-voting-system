<div class="page container" style="max-width:480px;">
  <h1 style="font-size:22px;font-weight:600;margin-bottom:1.5rem;">My Profile</h1>

  <div class="spinner" *ngIf="loading"></div>

  <div *ngIf="user && !loading" class="card">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;">
        {{ user.name?.charAt(0).toUpperCase() }}
      </div>
      <div>
        <p style="font-weight:600;font-size:17px;">{{ user.name }}</p>
        <p class="text-muted">{{ user.email }}</p>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:0.75rem;">
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--gray-100);">
        <span class="text-muted">State</span>
        <span style="font-weight:500;">{{ user.state }}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--gray-100);">
        <span class="text-muted">Role</span>
        <span class="badge" [style.background]="user.role === 'admin' ? 'var(--primary-light)' : 'var(--gray-100)'"
          [style.color]="user.role === 'admin' ? 'var(--primary)' : 'var(--gray-600)'">
          {{ user.role }}
        </span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;">
        <span class="text-muted">Member since</span>
        <span>{{ user.createdAt | date:'mediumDate' }}</span>
      </div>
    </div>
  </div>
</div>
